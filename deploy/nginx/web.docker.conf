# nginx inside the web container (docker-compose.prod). TLS is terminated by an
# upstream edge proxy / load balancer; this serves the SPA and proxies /api → api:8099.
map $http_upgrade $connection_upgrade { default upgrade; "" close; }

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location /api/v1/exploration-jobs/ {
        proxy_pass http://api:8099;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/ {
        proxy_pass http://api:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }
    location / { try_files $uri $uri/ /index.html; }
}

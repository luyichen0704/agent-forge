# agent-forge — nginx reverse proxy: TLS, SPA, API + SSE passthrough.
# Place at /etc/nginx/sites-available/agent-forge.conf and symlink into sites-enabled.

map $http_upgrade $connection_upgrade { default upgrade; "" close; }

server {
    listen 80;
    server_name agent-forge.example.com;
    # ACME http-01 challenge then redirect to https
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name agent-forge.example.com;

    ssl_certificate     /etc/letsencrypt/live/agent-forge.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent-forge.example.com/privkey.pem;

    # built SPA (vite dist) served as static files
    root /opt/agent-forge/web;
    index index.html;

    access_log /var/log/nginx/agent-forge.access.log;
    error_log  /var/log/nginx/agent-forge.error.log warn;

    client_max_body_size 10m;

    # SSE stream — no buffering, long read timeout
    location /api/v1/exploration-jobs/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # LLM planning calls
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
